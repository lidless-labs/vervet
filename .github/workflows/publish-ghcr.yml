name: Publish GHCR

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to publish, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  image:
    name: Container image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish
        env:
          IMAGE: ghcr.io/${{ github.repository }}
          VERSION_RAW: ${{ github.event.inputs.version || github.ref_name }}
        run: |
          VERSION="${VERSION_RAW#v}"
          if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Version must be semver, got: $VERSION_RAW" >&2
            exit 1
          fi
          MINOR="${VERSION%.*}"
          docker buildx build --push \
            --build-arg "VERSION=v${VERSION}" \
            -t "${IMAGE}:v${VERSION}" \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:${MINOR}" \
            -t "${IMAGE}:latest" \
            .
